<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary SEO Meta Tags -->
    <title>TheraBot - AI Mental Health Support | 24/7 Anonymous Therapy Chat</title>
    <meta name="description" content="TheraBot provides free, anonymous AI-powered mental health support. Chat anytime for emotional wellness, stress relief, and guidance. Private, secure, and always available." />
    <meta name="keywords" content="mental health, AI therapy, anonymous chat, emotional support, wellness, stress relief, depression help, anxiety support, online counseling, free therapy" />
    <meta name="author" content="TheraBot" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://therabot.app" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://therabot.app" />
    <meta property="og:title" content="TheraBot - AI Mental Health Support" />
    <meta property="og:description" content="Free, anonymous AI-powered mental health support available 24/7. Chat with TheraBot for emotional wellness and guidance." />
    <meta property="og:image" content="https://therabot.app/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="TheraBot" />
    <meta property="og:locale" content="en_US" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://therabot.app" />
    <meta property="twitter:title" content="TheraBot - AI Mental Health Support" />
    <meta property="twitter:description" content="Free, anonymous AI-powered mental health support available 24/7." />
    <meta property="twitter:image" content="https://therabot.app/og-image.jpg" />
    
    <!-- Theme Color -->
    <meta name="theme-color" content="#6366f1" />
    <meta name="msapplication-TileColor" content="#6366f1" />
    
    <!-- Apple Mobile Web App -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="TheraBot" />
    
    <!-- Preconnect for Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Structured Data - JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "TheraBot",
      "url": "https://therabot.app",
      "description": "AI-powered mental health support platform providing anonymous therapy chat services",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://therabot.app/search?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "TheraBot",
      "url": "https://therabot.app",
      "logo": "https://therabot.app/logo.png",
      "sameAs": [
        "https://twitter.com/therabot",
        "https://facebook.com/therabot",
        "https://instagram.com/therabot"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer support",
        "availableLanguage": ["English"]
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "TheraBot",
      "applicationCategory": "HealthApplication",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.8",
        "ratingCount": "1250"
      },
      "operatingSystem": "Web Browser",
      "description": "AI-powered mental health chat application"
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
